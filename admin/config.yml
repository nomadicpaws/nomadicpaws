backend:
  name: git-gateway
  branch: main

site_url: https://nomadicpaws.co
display_url: https://nomadicpaws.co

media_folder: images
public_folder: /images

collections:
  - name: blog
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Search description, name: description, widget: text, required: false, hint: "Optional but recommended. Write one natural sentence of about 140–160 characters describing what the post answers or explores." }
      - { label: Category, name: category, widget: select, options: [Trail Reports, Cheeto Diaries, Gear, Tips] }
      - { label: Date, name: date, widget: datetime }
      - { label: Cover image, name: image, widget: image, required: false, hint: "Optional. Leave blank to use a colored cover." }
      - { label: Cover image description, name: image_alt, widget: string, required: false, hint: "Describe what is visible in the image for screen readers and search engines. Example: Cheeto wearing a harness on a Tucson desert trail." }
      - { label: Keep as draft, name: draft, widget: boolean, default: true, required: false, hint: "Leave this on while editing. Turn it off when the post is ready to appear on the Trail Journal." }
      - { label: Body, name: body, widget: markdown }
