backend:
  name: git-gateway
  branch: main

site_url: https://nomadicpaws.co
display_url: https://nomadicpaws.co

media_folder: images
public_folder: /images

collections:
  - name: blog
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Category, name: category, widget: select, options: [Trail Reports, Cheeto Diaries, Gear, Tips] }
      - { label: Date, name: date, widget: datetime }
      - { label: Cover image, name: image, widget: image, required: false, hint: "Optional. Leave blank to use a colored cover." }
      - { label: Body, name: body, widget: markdown }
