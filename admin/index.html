<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Content Manager — Nomadic Paws</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/admin/admin.css" />

    <!-- Netlify Identity widget (load in head so it can handle invite/login handoff) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <noscript>
      Please enable JavaScript to use the content editor.
    </noscript>

    <!-- Initialize Netlify Identity safely (avoid double init) -->
    <script>
      (function () {
        if (window.netlifyIdentity && !window.netlifyIdentity.__np_inited) {
          try {
            window.netlifyIdentity.init();
          } catch (e) {
            // ignore
          }
          window.netlifyIdentity.__np_inited = true;

          // Keep users on /admin after login
          if (window.netlifyIdentity.on) {
            window.netlifyIdentity.on('login', function () {
              if (location.pathname !== '/admin/' && location.pathname !== '/admin') {
                location.href = '/admin/';
              }
            });
          }
        }
      })();
    </script>

    <!-- Decap CMS (load at end of body so it can mount into the DOM) -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
