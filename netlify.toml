[build]
  command = "node scripts/generate-sitemap.mjs"
  publish = "."

[functions]
  directory = "netlify/functions"
  # Bundle the CMS-authored Markdown posts so the posts API can read them.
  included_files = ["_posts/**"]

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/trail-journal/:slug"
  to = "/post.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/trail-journal"
  to = "/blog.html"
  status = 200
